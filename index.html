<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FreeEditor</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    header {
      min-height: 58px;
      padding: 10px;
      background: #1f1f1f;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }

    input,
    button {
      height: 36px;
      border: none;
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
    }

    input {
      background: #fff;
      color: #111;
    }

    #fileName {
      width: 180px;
    }

    #fileType {
      width: 150px;
    }

    button {
      background: #4a90e2;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #357abd;
    }

    button:active {
      transform: translateY(1px);
    }

    #uploadFile {
      display: none;
    }

    #status {
      min-height: 20px;
      margin-left: auto;
      color: #bdbdbd;
      font-size: 13px;
      line-height: 20px;
    }

    textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 18px;
      font-size: 16px;
      line-height: 1.5;
      background: #181818;
      color: #f5f5f5;
      font-family: Consolas, Monaco, "Courier New", monospace;
      tab-size: 2;
      white-space: pre;
      overflow: auto;
    }

    @media (max-width: 700px) {
      #fileName,
      #fileType {
        flex: 1 1 140px;
        width: auto;
        min-width: 0;
      }

      #status {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <header>
    <input id="fileName" type="text" placeholder="File name" value="my-file" />

    <input
      id="fileType"
      list="fileTypes"
      type="text"
      placeholder=".txt, .html, .anything"
      value=".txt"
    />

    <datalist id="fileTypes">
      <option value=".txt"></option>
      <option value=".html"></option>
      <option value=".hta"></option>
      <option value=".css"></option>
      <option value=".js"></option>
      <option value=".json"></option>
      <option value=".cmd"></option>
      <option value=".bat"></option>
      <option value=".ps1"></option>
      <option value=".py"></option>
      <option value=".java"></option>
      <option value=".md"></option>
      <option value=".xml"></option>
      <option value=".csv"></option>
      <option value=".cpp"></option>
      <option value=".c"></option>
      <option value=".php"></option>
      <option value=".sql"></option>
      <option value=".log"></option>
      <option value=".doc"></option>
      <option value=".docx"></option>
    </datalist>

    <input id="uploadFile" type="file" />
    <button type="button" onclick="openFilePicker()">Upload File</button>
    <button id="copyButton" type="button" onclick="copyEditorText()">Copy Text</button>
    <button type="button" onclick="exportFile()">Export</button>

    <span id="status" aria-live="polite"></span>
  </header>

  <textarea
    id="editor"
    placeholder="Start typing here or upload a file..."
    spellcheck="false"
  ></textarea>

  <script>
    const editor = document.getElementById("editor");
    const fileNameInput = document.getElementById("fileName");
    const fileTypeInput = document.getElementById("fileType");
    const uploadFileInput = document.getElementById("uploadFile");
    const copyButton = document.getElementById("copyButton");
    const statusText = document.getElementById("status");

    function setStatus(message) {
      statusText.textContent = message;
    }

    function openFilePicker() {
      uploadFileInput.value = "";
      uploadFileInput.click();
    }

    uploadFileInput.addEventListener("change", async function () {
      const file = uploadFileInput.files && uploadFileInput.files[0];

      if (!file) {
        return;
      }

      try {
        setStatus("Loading " + file.name + "...");

        const buffer = await file.arrayBuffer();
        const bytes = new Uint8Array(buffer);
        let encoding = "utf-8";
        let offset = 0;

        // Detect common byte-order marks so UTF-8 and UTF-16 text files load correctly.
        if (bytes.length >= 3 && bytes[0] === 0xef && bytes[1] === 0xbb && bytes[2] === 0xbf) {
          encoding = "utf-8";
          offset = 3;
        } else if (bytes.length >= 2 && bytes[0] === 0xff && bytes[1] === 0xfe) {
          encoding = "utf-16le";
          offset = 2;
        } else if (bytes.length >= 2 && bytes[0] === 0xfe && bytes[1] === 0xff) {
          encoding = "utf-16be";
          offset = 2;
        }

        const text = new TextDecoder(encoding).decode(bytes.subarray(offset));
        editor.value = text;

        const lastDot = file.name.lastIndexOf(".");

        if (lastDot > 0) {
          fileNameInput.value = file.name.substring(0, lastDot);
          fileTypeInput.value = file.name.substring(lastDot);
        } else {
          fileNameInput.value = file.name;
          fileTypeInput.value = ".txt";
        }

        const appearsBinary = text.includes("\u0000") || (text.match(/\uFFFD/g) || []).length > 5;

        if (appearsBinary) {
          setStatus("Loaded " + file.name + ". This appears to be a binary file, so some text may not display correctly.");
        } else {
          setStatus("Loaded " + file.name + " (" + text.length.toLocaleString() + " characters).");
        }

        editor.focus();
        editor.setSelectionRange(0, 0);
      } catch (error) {
        console.error(error);
        setStatus("Could not read the selected file.");
        alert("The selected file could not be read.");
      }
    });

    async function copyEditorText() {
      const content = editor.value;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(content);
        } else {
          editor.focus();
          editor.select();

          if (!document.execCommand("copy")) {
            throw new Error("Copy command failed.");
          }
        }

        const originalText = copyButton.textContent;
        copyButton.textContent = "Copied!";
        setStatus("Editor text copied to the clipboard.");

        window.setTimeout(function () {
          copyButton.textContent = originalText;
        }, 1400);
      } catch (error) {
        console.error(error);
        setStatus("Copy failed. Select the editor text and copy it manually.");
        alert("Copy failed. Select the editor text and copy it manually.");
      }
    }

    function exportFile() {
      const content = editor.value;

      let fileName = fileNameInput.value.trim();
      let fileType = fileTypeInput.value.trim();

      if (!fileName) {
        fileName = "untitled";
      }

      if (!fileType) {
        fileType = ".txt";
      }

      // Add the dot if the user types txt instead of .txt.
      if (!fileType.startsWith(".")) {
        fileType = "." + fileType;
      }

      fileType = fileType.replace(/\s+/g, "");
      fileName = fileName.replace(/\.[^/.]+$/, "");

      const finalFileName = fileName + fileType;

      const mimeTypes = {
        ".txt": "text/plain",
        ".json": "application/json",
        ".html": "text/html",
        ".hta": "application/hta",
        ".css": "text/css",
        ".js": "text/javascript",
        ".cmd": "text/plain",
        ".bat": "text/plain",
        ".ps1": "text/plain",
        ".java": "text/x-java-source",
        ".md": "text/markdown",
        ".xml": "application/xml",
        ".csv": "text/csv",
        ".py": "text/x-python",
        ".cpp": "text/x-c++src",
        ".c": "text/x-csrc",
        ".php": "application/x-httpd-php",
        ".sql": "application/sql",
        ".log": "text/plain"
      };

      const blob = new Blob([content], {
        type: mimeTypes[fileType.toLowerCase()] || "text/plain"
      });

      const url = URL.createObjectURL(blob);
      const downloadLink = document.createElement("a");

      downloadLink.href = url;
      downloadLink.download = finalFileName;

      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
      URL.revokeObjectURL(url);

      setStatus("Exported " + finalFileName + ".");
    }
  </script>
</body>
</html>
