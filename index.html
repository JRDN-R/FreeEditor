<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f1f1f" />
  <title>FreeEditor</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    header {
      flex: 0 0 auto;
      min-height: 58px;
      padding: 10px;
      background: #1f1f1f;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }

    input,
    button {
      height: 38px;
      border: none;
      border-radius: 6px;
      padding: 0 12px;
      font-size: 14px;
    }

    input[type="text"] {
      background: #fff;
      color: #111;
    }

    #fileName {
      width: 180px;
    }

    #fileType {
      width: 145px;
    }

    #uploadFile {
      display: none;
    }

    button {
      background: #4a90e2;
      color: #fff;
      cursor: pointer;
      font-weight: 700;
      white-space: nowrap;
      touch-action: manipulation;
    }

    button:hover,
    button:focus-visible {
      background: #357abd;
    }

    #uploadButton {
      background: #2f9e5b;
    }

    #uploadButton:hover,
    #uploadButton:focus-visible {
      background: #267f49;
    }

    #copyButton {
      background: #7257c7;
    }

    #copyButton:hover,
    #copyButton:focus-visible {
      background: #5e45aa;
    }

    #status {
      min-width: 0;
      margin-left: auto;
      color: #cfcfcf;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #editor {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      resize: none;
      border: none;
      outline: none;
      padding: 18px;
      font-size: 16px;
      line-height: 1.5;
      background: #181818;
      color: #f5f5f5;
      font-family: Consolas, Monaco, "Courier New", monospace;
      tab-size: 2;
      white-space: pre;
      overflow: auto;
    }

    @media (max-width: 760px) {
      html,
      body {
        overflow: auto;
      }

      body {
        min-height: 100%;
      }

      header {
        align-items: stretch;
      }

      #fileName,
      #fileType {
        flex: 1 1 140px;
        width: auto;
        min-width: 0;
      }

      button {
        flex: 1 1 auto;
      }

      #status {
        flex-basis: 100%;
        width: 100%;
        margin-left: 0;
      }

      #editor {
        min-height: 65vh;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <header>
    <input id="fileName" type="text" placeholder="File name" value="my-file" aria-label="File name" />

    <input
      id="fileType"
      list="fileTypes"
      type="text"
      placeholder=".txt, .html, .anything"
      value=".txt"
      aria-label="File extension"
    />

    <datalist id="fileTypes">
      <option value=".txt"></option>
      <option value=".html"></option>
      <option value=".hta"></option>
      <option value=".css"></option>
      <option value=".js"></option>
      <option value=".json"></option>
      <option value=".cmd"></option>
      <option value=".bat"></option>
      <option value=".ps1"></option>
      <option value=".py"></option>
      <option value=".java"></option>
      <option value=".md"></option>
      <option value=".xml"></option>
      <option value=".csv"></option>
      <option value=".cpp"></option>
      <option value=".c"></option>
      <option value=".php"></option>
      <option value=".sql"></option>
      <option value=".log"></option>
      <option value=".doc"></option>
      <option value=".docx"></option>
    </datalist>

    <input id="uploadFile" type="file" accept="*/*" />
    <button id="uploadButton" type="button">Upload File</button>
    <button id="copyButton" type="button">Copy All</button>
    <button id="exportButton" type="button">Export</button>

    <span id="status" role="status" aria-live="polite">Ready</span>
  </header>

  <textarea
    id="editor"
    placeholder="Start typing here or upload a text/code file..."
    spellcheck="false"
    autocapitalize="off"
    autocomplete="off"
    autocorrect="off"
  ></textarea>

  <script>
    "use strict";

    const editor = document.getElementById("editor");
    const fileNameInput = document.getElementById("fileName");
    const fileTypeInput = document.getElementById("fileType");
    const uploadFileInput = document.getElementById("uploadFile");
    const uploadButton = document.getElementById("uploadButton");
    const copyButton = document.getElementById("copyButton");
    const exportButton = document.getElementById("exportButton");
    const statusText = document.getElementById("status");

    function setStatus(message) {
      statusText.textContent = message;
    }

    function splitFileName(fullName) {
      const lastDot = fullName.lastIndexOf(".");

      if (lastDot > 0) {
        return {
          name: fullName.slice(0, lastDot),
          extension: fullName.slice(lastDot)
        };
      }

      return {
        name: fullName || "untitled",
        extension: ".txt"
      };
    }

    function decodeFile(buffer) {
      const bytes = new Uint8Array(buffer);
      let encoding = "utf-8";
      let offset = 0;

      if (
        bytes.length >= 3 &&
        bytes[0] === 0xef &&
        bytes[1] === 0xbb &&
        bytes[2] === 0xbf
      ) {
        offset = 3;
      } else if (
        bytes.length >= 2 &&
        bytes[0] === 0xff &&
        bytes[1] === 0xfe
      ) {
        encoding = "utf-16le";
        offset = 2;
      } else if (
        bytes.length >= 2 &&
        bytes[0] === 0xfe &&
        bytes[1] === 0xff
      ) {
        encoding = "utf-16be";
        offset = 2;
      }

      return new TextDecoder(encoding).decode(bytes.subarray(offset));
    }

    uploadButton.addEventListener("click", function () {
      uploadFileInput.value = "";
      uploadFileInput.click();
    });

    uploadFileInput.addEventListener("change", async function () {
      const file = uploadFileInput.files && uploadFileInput.files[0];

      if (!file) {
        return;
      }

      try {
        setStatus("Loading " + file.name + "...");

        const buffer = await file.arrayBuffer();
        const text = decodeFile(buffer);
        const parts = splitFileName(file.name);

        editor.value = text;
        fileNameInput.value = parts.name;
        fileTypeInput.value = parts.extension;

        const replacementCharacters = (text.match(/\uFFFD/g) || []).length;
        const appearsBinary = text.includes("\u0000") || replacementCharacters > 5;

        if (appearsBinary) {
          setStatus(
            "Loaded " + file.name + ". This appears to be binary, so its readable text may be limited."
          );
        } else {
          setStatus(
            "Loaded " + file.name + " (" + text.length.toLocaleString() + " characters)"
          );
        }

        editor.focus();
        editor.setSelectionRange(0, 0);
      } catch (error) {
        console.error(error);
        setStatus("Could not read the selected file");
        alert("The selected file could not be read.");
      }
    });

    copyButton.addEventListener("click", async function () {
      const content = editor.value;

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(content);
        } else {
          editor.focus();
          editor.select();

          if (!document.execCommand("copy")) {
            throw new Error("Copy command failed");
          }
        }

        copyButton.textContent = "Copied!";
        setStatus("All editor text copied");

        window.setTimeout(function () {
          copyButton.textContent = "Copy All";
        }, 1400);
      } catch (error) {
        console.error(error);
        setStatus("Copy failed. Select the text and copy it manually.");
        alert("Copy failed. Select the editor text and copy it manually.");
      }
    });

    exportButton.addEventListener("click", function () {
      let fileName = fileNameInput.value.trim() || "untitled";
      let fileType = fileTypeInput.value.trim() || ".txt";

      if (!fileType.startsWith(".")) {
        fileType = "." + fileType;
      }

      fileType = fileType.replace(/\s+/g, "");
      fileName = fileName.replace(/\.[^/.]+$/, "");

      const finalFileName = fileName + fileType;
      const mimeTypes = {
        ".txt": "text/plain;charset=utf-8",
        ".html": "text/html;charset=utf-8",
        ".hta": "text/html;charset=utf-8",
        ".css": "text/css;charset=utf-8",
        ".js": "text/javascript;charset=utf-8",
        ".json": "application/json;charset=utf-8",
        ".cmd": "text/plain;charset=utf-8",
        ".bat": "text/plain;charset=utf-8",
        ".ps1": "text/plain;charset=utf-8",
        ".py": "text/x-python;charset=utf-8",
        ".md": "text/markdown;charset=utf-8",
        ".xml": "application/xml;charset=utf-8",
        ".csv": "text/csv;charset=utf-8"
      };

      const blob = new Blob([editor.value], {
        type: mimeTypes[fileType.toLowerCase()] || "text/plain;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);
      const downloadLink = document.createElement("a");

      downloadLink.href = url;
      downloadLink.download = finalFileName;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      downloadLink.remove();

      window.setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 1000);

      setStatus("Exported " + finalFileName);
    });

    editor.addEventListener("keydown", function (event) {
      if (event.key !== "Tab") {
        return;
      }

      event.preventDefault();

      const start = editor.selectionStart;
      const end = editor.selectionEnd;
      const tab = "  ";

      editor.setRangeText(tab, start, end, "end");
    });
  </script>
</body>
</html>
